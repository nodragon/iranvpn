name: iranvpn build safe

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check system tools (debug)
        run: |
          which tar
          tar --version
          echo $PATH

      - name: Install Rust
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add aarch64-linux-android armv7-linux-androideabi

      - name: Install Android SDK (safe)
        run: |
          set -e
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk

          wget -O tools.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip tools.zip

          mv cmdline-tools cmdline-tools/latest

          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

          yes | sdkmanager --licenses

          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build (Rust core)
        run: |
          chmod +x scripts/build-android-core.sh || true
          ./scripts/build-android-core.sh || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iranvpn-apk
          path: android/app/build/outputs/apk/debug/*.apk

name: Android CI Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip tar

      - name: Setup Android SDK (FIXED VERSION)
        run: |
          set -e

          echo "Installing Android SDK..."

          mkdir -p $ANDROID_SDK_ROOT

          # 下载 cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip

          # 解压到临时目录
          mkdir -p temp
          unzip -q cmdline.zip -d temp

          # ⭐关键修复：只移动内容，不移动整个目录
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv temp/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

          # 环境变量
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

          echo "SDK setup done."

      - name: Install Android platforms & build tools
        run: |
          set -e

          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Grant permission
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew clean assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

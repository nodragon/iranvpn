name: Build Android APK with Rust Core

on:
  workflow_dispatch:  # 手动触发，不用每次 push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 'latest'

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Set up Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add aarch64-linux-android armv7-linux-androideabi
          cargo install cargo-ndk

      - name: Build Rust core
        run: |
          # 强制锁定 android-activity 到 0.5.1（无 bug 版本）
          cargo update -p android-activity --precise 0.5.1
          cargo ndk -t aarch64-linux-android -t armv7-linux-androideabi build --release
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          cp target/aarch64-linux-android/release/libiran_vpn_core.so android/app/src/main/jniLibs/arm64-v8a/
          cp target/armv7-linux-androideabi/release/libiran_vpn_core.so android/app/src/main/jniLibs/armeabi-v7a/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: iranvpn-complete
          path: android/app/build/outputs/apk/debug/*.apk
